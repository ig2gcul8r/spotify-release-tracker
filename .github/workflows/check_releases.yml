name: Check Spotify Releases

on:
  schedule:
    # 毎日 日本時間 9:00 (UTC 0:00) に実行
    - cron: "0 0 * * *"
  workflow_dispatch: {} # 手動実行も可能

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check for new releases
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python check_releases.py

      - name: Commit updated state & calendar
        run: |
          git config user.name "release-tracker-bot"
          git config user.email "actions@github.com"
          git add seen_releases.json docs/releases.ics
          git diff --cached --quiet || git commit -m "Update releases $(date -u +%Y-%m-%d)"
          git push
